<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Play</title>
    <link rel="stylesheet" href="/common.css" />
    <style>
      .student-page {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        position: relative;
      }

      /* Connection Status Indicator */
      .connection-status {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.7rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        z-index: 1000;
        transition: all 0.3s ease;
      }

      /* Lives Display */
      .lives-display {
        position: fixed;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 0.9rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        z-index: 1000;
        transition: all 0.3s ease;
      }

      .lives-display .heart {
        font-size: 1.2rem;
        color: var(--error);
        transition: all 0.3s ease;
        animation: heartbeat 1.5s ease-in-out infinite;
      }

      .lives-display .heart.lost {
        opacity: 0.3;
        filter: grayscale(100%);
        animation: none;
      }

      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        10% { transform: scale(1.1); }
        20% { transform: scale(1); }
      }

      .lives-display.losing-life {
        animation: shake 0.5s ease;
        border-color: var(--error);
        box-shadow: 0 0 20px var(--error-glow);
      }

      @keyframes shake {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-50%) translateY(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(-50%) translateY(5px); }
      }

      .connection-status .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .connection-status.connected .status-dot {
        background: var(--success);
        box-shadow: 0 0 4px var(--success-glow);
      }

      .connection-status.disconnected .status-dot {
        background: var(--error);
        box-shadow: 0 0 4px var(--error-glow);
        animation: pulse-error 1s ease-in-out infinite;
      }

      .connection-status.connecting .status-dot {
        background: var(--primary);
        box-shadow: 0 0 4px var(--primary-glow);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      @keyframes pulse-error {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.2); }
      }

      .student-page main {
        flex: 1;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        border: 0;
        background: transparent;
      }

      .phase-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
      }

      #phase-round {
        width: 100%;
      }

      #phase-round .options-grid {
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
      }

      .lobby-info {
        padding: 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0;
      }

      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 1rem auto;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .countdown-display {
        font-size: 6rem;
        font-weight: 100;
        color: var(--primary);
        margin: 1rem 0;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 30px var(--primary-glow);
        line-height: 1;
      }

      .question-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 1rem;
        margin-bottom: 1rem;
        display: none;
      }

      .question-text {
        font-size: 1.15rem;
        font-weight: 400;
        margin: 0;
        letter-spacing: -0.01em;
      }

      .options-grid {
        display: grid;
        gap: 0.75rem;
        margin-top: 1rem;
        width: 100%;
      }

      .option-button {
        min-height: 72px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0.7rem;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 0;
        background: var(--surface-elevated);
        text-align: left;
        font-size: 1rem;
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s ease;
        animation: slideIn 0.2s ease-out;
        position: relative;
        /* Better touch targets for mobile */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* Ensure minimum touch target size (44x44px per WCAG) */
      @media (pointer: coarse) {
        .option-button {
          min-height: 56px;
          padding: 0.85rem 1rem;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .option-button:hover:not(:disabled) {
        border-color: var(--primary);
        box-shadow: 0 0 0 1px var(--primary), 0 0 12px var(--primary-glow);
        transform: translateY(-2px);
      }

      .option-button:active:not(:disabled) {
        transform: scale(0.98) translateY(0);
        background: var(--primary-glow);
      }

      .option-button.urgent {
        animation: urgentPulse 1.5s ease-in-out infinite;
      }

      @keyframes urgentPulse {
        0%, 100% {
          border-color: var(--error);
          box-shadow: 0 0 0 0 var(--error-glow);
        }
        50% {
          border-color: var(--error);
          box-shadow: 0 0 0 4px var(--error-glow);
        }
      }

      .option-button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .option-button.picked {
        border-color: var(--success);
        background: var(--success-glow);
        box-shadow: 0 0 0 1px var(--success), inset 0 0 20px var(--success-glow);
        pointer-events: none;
      }

      .option-button.picked::after {
        content: '✓';
        position: absolute;
        right: 1rem;
        font-size: 1.5rem;
        color: var(--success);
        animation: checkmark 0.3s ease-out;
      }

      @keyframes checkmark {
        from {
          opacity: 0;
          transform: scale(0) rotate(-45deg);
        }
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      .option-label {
        font-weight: 500;
        font-size: 1rem;
        color: var(--primary);
        min-width: 1.5rem;
      }

      .option-text {
        flex: 1;
      }

      .option-slots {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }

      .option-slots.low {
        color: var(--error);
        font-weight: 600;
      }

      /* Round Timer */
      .round-timer {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        padding: 0.4rem 0.7rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        font-size: 0.85rem;
        font-variant-numeric: tabular-nums;
        z-index: 1000;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .round-timer.critical {
        color: var(--error);
        border-color: var(--error);
        animation: timerPulse 1s ease-in-out infinite;
      }

      @keyframes timerPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      /* Empty State */
      .empty-state {
        padding: 2rem 1rem;
        text-align: center;
        color: var(--muted);
      }

      .empty-state-icon {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        opacity: 0.5;
      }

      .pick-status {
        padding: 1rem;
        background: var(--surface);
        border: 1px solid var(--primary);
        border-radius: 0;
        font-weight: 500;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.9rem;
      }

      .eliminated-banner {
        padding: 2rem 1rem;
        background: rgba(255, 51, 102, 0.05);
        border: 1px solid var(--error);
        border-radius: 0;
        text-align: center;
        animation: eliminationBanner 0.8s ease-out;
      }

      @keyframes eliminationBanner {
        0% {
          opacity: 0;
          transform: scale(0.8) rotateX(-90deg);
        }
        50% {
          transform: scale(1.05) rotateX(5deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotateX(0);
        }
      }

      .eliminated-title {
        font-size: 2.5rem;
        font-weight: 300;
        color: var(--error);
        margin: 0 0 0.5rem;
        letter-spacing: 0.15em;
        text-shadow: 0 0 20px var(--error-glow);
        animation: eliminationText 0.6s ease-out;
      }

      @keyframes eliminationText {
        0% {
          opacity: 0;
          transform: scale(0);
        }
        60% {
          transform: scale(1.2);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Life Lost Notification */
      .life-lost-notification {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 51, 102, 0.95);
        color: white;
        padding: 2rem 3rem;
        border: 2px solid var(--error);
        border-radius: 0;
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.1em;
        z-index: 2000;
        box-shadow: 0 0 40px var(--error-glow);
        animation: lifeLostPop 1s ease-out forwards;
        pointer-events: none;
      }

      @keyframes lifeLostPop {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.5);
        }
        20% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.2);
        }
        80% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.8);
        }
      }

      .eliminated-reason {
        font-size: 1rem;
        color: var(--muted);
        margin: 0;
      }

      .results-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 1rem;
      }

      .results-title {
        font-size: 1.5rem;
        font-weight: 300;
        margin: 0 0 1rem;
        text-align: center;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .leaderboard-entry {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem;
        border-bottom: 1px solid var(--border);
      }

      .leaderboard-entry:last-child {
        border-bottom: 0;
      }

      .leaderboard-entry.me {
        background: var(--primary-glow);
        border-radius: 0;
        font-weight: 500;
        border: 1px solid var(--primary);
        margin: -1px;
      }

      .rank-badge {
        font-weight: 500;
        font-size: 1rem;
        color: var(--primary);
        min-width: 2rem;
        font-variant-numeric: tabular-nums;
      }

      .player-name {
        flex: 1;
      }

      .player-status {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body class="student-page">
    <!-- Connection Status Indicator -->
    <div class="connection-status connecting" id="connection-status">
      <div class="status-dot"></div>
      <span id="connection-text">Connecting...</span>
    </div>

    <!-- Lives Display -->
    <div class="lives-display hidden" id="lives-display">
      <span class="heart" data-life="1">❤️</span>
      <span class="heart" data-life="2">❤️</span>
      <span class="heart" data-life="3">❤️</span>
    </div>

    <!-- Round Timer -->
    <div class="round-timer hidden" id="round-timer">--</div>

    <main>
      <div id="phase-lobby" class="phase-container hidden">
        <div class="lobby-info">
          <h2>Waiting for Game</h2>
          <p class="muted">Host will start soon</p>
          <p id="lobby-player-count" class="muted"></p>
        </div>
      </div>

      <div id="phase-countdown" class="phase-container hidden">
        <h2>Get Ready!</h2>
        <div id="countdown-value" class="countdown-display">3</div>
      </div>

      <div id="phase-round" class="phase-container hidden">
        <div class="question-card">
          <p id="round-number" class="muted" style="margin: 0 0 0.5rem; font-size: 0.9rem;">Round 1</p>
          <p id="question-text" class="question-text">Question text</p>
        </div>
        <h2 style="margin-bottom: 1.5rem; font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; font-size: 1rem; color: var(--muted);">
          Pick Your Answer
        </h2>
        <div id="options-container" class="options-grid">
          <!-- Options will be rendered here -->
        </div>
        <div id="pick-status" class="pick-status hidden">Locked in!</div>
      </div>

      <div id="phase-eliminated" class="phase-container hidden">
        <div class="eliminated-banner">
          <h2 class="eliminated-title">ELIMINATED</h2>
          <p id="elimination-reason" class="eliminated-reason">You were eliminated</p>
        </div>
        <p class="muted" style="margin-top: 1rem;">Waiting for game to finish...</p>
      </div>

      <div id="phase-results" class="phase-container hidden">
        <div class="results-card">
          <h2 class="results-title">Game Over!</h2>
          <div id="results-leaderboard">
            <!-- Leaderboard entries here -->
          </div>
        </div>
      </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/common.js"></script>
    <script src="/student.js"></script>
  </body>
</html>
