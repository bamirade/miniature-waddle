<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Host Dashboard</title>
    <link rel="stylesheet" href="/common.css" />
    <style>
      .host-page {
        min-height: 100vh;
        background: var(--bg);
      }

      .host-page main {
        max-width: 960px;
        margin: 0 auto;
        padding: 1.5rem;
      }

      .dashboard-header {
        margin-bottom: 1.5rem;
        animation: fadeIn 0.4s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .dashboard-title {
        font-size: 1.8rem;
        font-weight: 400;
        margin: 0 0 0.5rem;
        letter-spacing: -0.03em;
      }

      .dashboard-grid {
        display: grid;
        gap: 1px;
        grid-template-columns: 1fr 1fr;
        background: var(--border);
        border: 1px solid var(--border);
      }

      @media (max-width: 768px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: var(--surface);
        border: none;
        border-radius: 0;
        padding: 1rem;
        transition: background 0.2s ease;
      }

      .card:hover {
        background: var(--surface-elevated);
      }

      .card-title {
        font-size: 1.1rem;
        font-weight: 400;
        margin: 0 0 0.75rem;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .join-info {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      #qr-code {
        width: 160px;
        height: 160px;
        margin: 0 auto;
        background: #fff;
        padding: 0.5rem;
        border-radius: 0;
        border: 1px solid var(--border-bright);
      }

      #qr-code canvas,
      #qr-code img {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      .join-url-display {
        padding: 0.65rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 0.85rem;
        word-break: break-all;
        text-align: center;
        color: var(--primary);
      }

      .stat-row {
        display: flex;
        gap: 1px;
        justify-content: space-around;
        padding: 0;
        background: var(--border);
        border-radius: 0;
      }

      .stat-item {
        text-align: center;
        flex: 1;
        padding: 0.75rem;
        background: var(--surface-elevated);
      }

      .stat-value {
        font-size: 1.8rem;
        font-weight: 300;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
        transition: transform 0.2s ease, color 0.2s ease;
      }

      .stat-value.updated {
        animation: statPulse 0.4s ease-out;
      }

      @keyframes statPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); color: var(--success); }
      }

      .stat-label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 0.25rem;
      }

      .player-list {
        display: grid;
        gap: 0;
        max-height: 300px;
        overflow-y: auto;
        border-top: 1px solid var(--border);
      }

      /* Custom scrollbar */
      .player-list::-webkit-scrollbar {
        width: 6px;
      }

      .player-list::-webkit-scrollbar-track {
        background: transparent;
      }

      .player-list::-webkit-scrollbar-thumb {
        background: var(--border-bright);
        border-radius: 0;
      }

      .player-list::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      .player-entry {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        background: transparent;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        font-size: 0.9rem;
        animation: slideInLeft 0.3s ease-out;
        transition: background 0.15s ease;
      }

      .player-entry:hover {
        background: var(--surface-elevated);
      }

      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .player-entry:last-child {
        border-bottom: none;
      }

      .player-status-badge {
        width: 6px;
        height: 6px;
        border-radius: 0;
        flex-shrink: 0;
        border: 1px solid currentColor;
      }

      .player-status-badge.ready {
        background: var(--success);
        border-color: var(--success);
      }

      .player-status-badge.alive {
        background: var(--primary);
        border-color: var(--primary);
      }

      .player-status-badge.eliminated {
        background: transparent;
        border-color: var(--error);
      }

      .player-name {
        flex: 1;
      }

      .player-meta {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .start-button {
        width: 100%;
        min-height: 56px;
        border: 1px solid var(--success);
        border-radius: 0;
        background: transparent;
        color: var(--success);
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .start-button:hover:not(:disabled) {
        background: var(--success-glow);
        box-shadow: 0 0 20px var(--success-glow);
      }

      .start-button:active:not(:disabled) {
        background: var(--success);
        color: #000;
      }

      .start-button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .round-display {
        grid-column: 1 / -1;
      }

      .round-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .round-number-badge {
        padding: 0.4rem 0.7rem;
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
        border-radius: 0;
        font-weight: 500;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .round-timer {
        font-size: 0.9rem;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .question-display {
        padding: 1rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        margin-bottom: 1rem;
      }

      .question-text {
        font-size: 1.1rem;
        font-weight: 400;
        margin: 0;
        letter-spacing: -0.01em;
      }

      .options-display {
        display: grid;
        gap: 0.75rem;
      }

      .option-bar {
        padding: 0.75rem;
        background: var(--surface-elevated);
        border: 1px solid var(--border);
        border-radius: 0;
        animation: slideIn 0.2s ease-out;
        transition: border-color 0.2s ease;
      }

      .option-bar:hover {
        border-color: var(--border-bright);
      }

      .option-bar.full {
        opacity: 0.5;
        animation: fadeOut 0.3s ease-out forwards;
      }

      @keyframes fadeOut {
        to { opacity: 0; transform: translateX(-10px); }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .option-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .option-label {
        font-weight: 500;
        color: var(--primary);
        font-size: 0.85rem;
        min-width: 1.5rem;
      }

      .option-text {
        flex: 1;
        font-size: 0.95rem;
      }

      .option-stats {
        display: flex;
        gap: 1rem;
        font-size: 0.85rem;
      }

      .option-stat {
        display: flex;
        gap: 0.3rem;
      }

      .option-stat-label {
        color: var(--muted);
      }

      .option-stat-value {
        font-weight: 600;
      }

      .option-progress {
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 0;
        overflow: hidden;
        margin-top: 0.5rem;
        position: relative;
        border: 1px solid var(--border);
      }

      .option-progress-fill {
        height: 100%;
        background: var(--primary);
        transition: width 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        color: transparent;
        font-size: 0.75rem;
        font-weight: 500;
        box-shadow: 0 0 8px var(--primary-glow);
      }

      .option-progress-fill.full {
        background: var(--error);
        box-shadow: 0 0 8px var(--error-glow);
      }

      .countdown-display {
        text-align: center;
        padding: 2rem;
      }

      .countdown-value {
        font-size: 4rem;
        font-weight: 200;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 20px var(--primary-glow);
      }

      .results-display {
        grid-column: 1 / -1;
      }

      .podium {
        display: flex;
        gap: 1px;
        justify-content: center;
        margin-bottom: 1rem;
        background: var(--border);
      }

      .podium-entry {
        text-align: center;
        padding: 1.5rem 1rem;
        background: var(--surface-elevated);
        border-radius: 0;
        min-width: 140px;
        border: none;
      }

      .podium-rank {
        font-size: 2.5rem;
        font-weight: 200;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
      }

      .podium-name {
        font-weight: 400;
        margin-top: 0.5rem;
        letter-spacing: -0.01em;
      }

      /* Fullscreen Flash Display */
      .flash-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        animation: flashIn 0.3s ease-out;
      }

      @keyframes flashIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .flash-timer {
        position: absolute;
        top: 2rem;
        right: 2rem;
        font-size: 3rem;
        font-weight: 200;
        color: var(--primary);
        font-variant-numeric: tabular-nums;
        padding: 1rem 2rem;
        border: 2px solid var(--primary);
        background: var(--surface-elevated);
        text-shadow: 0 0 20px var(--primary-glow);
        box-shadow: 0 0 30px var(--primary-glow);
      }

      .flash-timer.critical {
        color: var(--error);
        border-color: var(--error);
        animation: flashPulse 0.5s ease-in-out infinite;
      }

      @keyframes flashPulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 30px var(--error-glow);
        }
        50% {
          transform: scale(1.05);
          box-shadow: 0 0 50px var(--error-glow);
        }
      }

      .flash-round {
        position: absolute;
        top: 2rem;
        left: 2rem;
        font-size: 1.2rem;
        font-weight: 400;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .flash-content {
        max-width: 1200px;
        width: 100%;
      }

      .flash-question {
        font-size: 3rem;
        font-weight: 300;
        color: var(--text);
        text-align: center;
        margin-bottom: 3rem;
        line-height: 1.3;
        letter-spacing: -0.02em;
        animation: slideDown 0.4s ease-out 0.2s both;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .flash-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        animation: fadeInUp 0.4s ease-out 0.4s both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .flash-option {
        padding: 2rem;
        border: 2px solid var(--border);
        background: var(--surface-elevated);
        display: flex;
        align-items: center;
        gap: 1.5rem;
        transition: all 0.3s ease;
      }

      .flash-option:hover {
        border-color: var(--primary);
        box-shadow: 0 0 20px var(--primary-glow);
      }

      .flash-option.full {
        opacity: 0.3;
        animation: fadeOutOption 0.5s ease-out forwards;
      }

      @keyframes fadeOutOption {
        to {
          opacity: 0;
          transform: scale(0.9);
        }
      }

      .flash-option-label {
        font-size: 3rem;
        font-weight: 200;
        color: var(--primary);
        min-width: 4rem;
        text-align: center;
      }

      .flash-option-text {
        flex: 1;
        font-size: 1.5rem;
        font-weight: 300;
        line-height: 1.4;
      }

      @media (max-width: 1024px) {
        .flash-question {
          font-size: 2rem;
        }

        .flash-options {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .flash-option {
          padding: 1.5rem;
        }

        .flash-option-label {
          font-size: 2rem;
          min-width: 3rem;
        }

        .flash-option-text {
          font-size: 1.2rem;
        }

        .flash-timer {
          font-size: 2rem;
          padding: 0.75rem 1.5rem;
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body class="host-page">
    <!-- Fullscreen Flash Display -->
    <div class="flash-overlay hidden" id="flash-overlay">
      <div class="flash-round" id="flash-round">Round 1</div>
      <div class="flash-timer" id="flash-timer">10</div>
      <div class="flash-content">
        <div class="flash-question" id="flash-question">Question text appears here</div>
        <div class="flash-options" id="flash-options">
          <!-- Options will be rendered here -->
        </div>
      </div>
    </div>

    <main>
      <div class="dashboard-header">
        <h1 class="dashboard-title">Host Dashboard</h1>
        <p class="muted">Manage your classroom game session</p>
      </div>

      <div class="dashboard-grid">
        <!-- Join Info Card -->
        <div class="card">
          <h2 class="card-title">Student Join</h2>
          <div class="join-info">
            <div id="qr-code"></div>
            <div id="join-url" class="join-url-display">Loading...</div>
          </div>
        </div>

        <!-- Stats Card -->
        <div class="card">
          <h2 class="card-title">Game Stats</h2>
          <div class="stat-row">
            <div class="stat-item">
              <div id="stat-total" class="stat-value">0</div>
              <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
              <div id="stat-ready" class="stat-value">0</div>
              <div class="stat-label">Ready</div>
            </div>
            <div class="stat-item">
              <div id="stat-alive" class="stat-value">0</div>
              <div class="stat-label">Alive</div>
            </div>
          </div>
        </div>

        <!-- Players Card -->
        <div class="card">
          <h2 class="card-title">Players</h2>
          <div id="player-list" class="player-list">
            <p class="muted">No players yet</p>
          </div>
        </div>

        <!-- Control Card -->
        <div class="card">
          <h2 class="card-title">Control</h2>
          <button id="start-button" class="start-button" disabled>Start Game</button>
        </div>

        <!-- Countdown Display -->
        <div id="countdown-card" class="card hidden" style="grid-column: 1 / -1;">
          <div class="countdown-display">
            <h2>Game Starting...</h2>
            <div id="countdown-value" class="countdown-value">3</div>
          </div>
        </div>

        <!-- Round Display -->
        <div id="round-card" class="card round-display hidden">
          <div class="round-header">
            <span id="round-number" class="round-number-badge">Round 1</span>
            <span id="round-timer" class="round-timer"></span>
          </div>
          <div class="question-display">
            <p id="question-text" class="question-text">Question will appear here</p>
          </div>
          <div id="options-display" class="options-display">
            <!-- Options will be rendered here -->
          </div>
        </div>

        <!-- Results Display -->
        <div id="results-card" class="card results-display hidden">
          <h2 class="card-title">Game Over - Top 3</h2>
          <div id="podium" class="podium">
            <!-- Podium entries here -->
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/common.js"></script>
    <script src="/host.js"></script>
  </body>
</html>
